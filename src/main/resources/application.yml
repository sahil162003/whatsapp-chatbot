spring:
  application:
    name: Whatsapp_Chatbot

  datasource:
    url: jdbc:mysql://localhost:3306/ChatBots?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    file:
      name: logs/app.log

server:
  port: 8801